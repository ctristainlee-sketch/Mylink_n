
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault Node — Mylinks</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyD9v8tKBmSU9vqqgBO34yBMRrbHcFZFAs0",
    authDomain: "yoshiuniverse-6e0c9.firebaseapp.com",
    databaseURL: "https://yoshiuniverse-6e0c9-default-rtdb.firebaseio.com",
    projectId: "yoshiuniverse-6e0c9",
    storageBucket: "yoshiuniverse-6e0c9.firebasestorage.app",
    messagingSenderId: "645597342267",
    appId: "1:645597342267:web:77b3b632310f86e198ca1e"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  onAuthStateChanged(auth, (user) => {
    const login = document.getElementById('login-zone');
    const vault = document.getElementById('vault-zone');
    if (user) {
      login.style.display = 'none';
      vault.style.display = 'block';
      loadVault(user.uid);
    } else {
      login.style.display = 'block';
      vault.style.display = 'none';
    }
  });

  async function atlasVaultPurge(uid, id, url) {
    if (!url || !url.startsWith('http')) return;
    try {
      await fetch(url, { mode: 'no-cors' });
    } catch (err) {
      // If the error is a network "Hardwall", purge the link
      if (err instanceof TypeError || err.name === 'AbortError') {
        remove(ref(db, `users/${uid}/links/${id}`));
      }
    }
  }

  function loadVault(uid) {
    // Reference matches your Firebase Rules screenshot: users/$uid/links
    onValue(ref(db, `users/${uid}/links`), (snap) => {
      const list = document.getElementById('v-list');
      list.innerHTML = '';
      snap.forEach(child => {
        const d = child.val();
        const card = document.createElement('div');
        card.className = 'v-card';
        const isHtml = d.url.trim().startsWith('<');
        
        if (isHtml) {
          card.innerHTML = `
            <div class="v-header"><strong>${d.name}</strong> <span class="v-tag">VAULT_CODE</span></div>
            <div class="v-html">${d.url}</div>
          `;
        } else {
          card.innerHTML = `
            <div class="v-header"><strong>${d.name}</strong> <span class="v-tag">VAULT_URL</span></div>
            <small>${d.url}</small>
            <div style="margin-top:10px"><a href="${d.url}" target="_blank" class="v-btn">OPEN VAULT</a></div>
          `;
          atlasVaultPurge(uid, child.key, d.url);
        }
        list.appendChild(card);
      });
    });
  }

  window.authAction = (t) => {
    const e = document.getElementById('e').value;
    const p = document.getElementById('p').value;
    if(t === 'in') signInWithEmailAndPassword(auth, e, p).catch(err => console.error(err.message));
    else createUserWithEmailAndPassword(auth, e, p).catch(err => console.error(err.message));
  };

  window.addVault = () => {
    const n = document.getElementById('vn').value;
    const u = document.getElementById('vu').value;
    if(n && u && auth.currentUser) {
      push(ref(db, `users/${auth.currentUser.uid}/links`), { 
        name: n, 
        url: u,
        addedAt: Date.now() 
      });
      document.getElementById('vn').value = '';
      document.getElementById('vu').value = '';
    }
  };
</script>
<style>
  body { 
    margin: 0; padding: 20px;
    background: #020408 url('https://cdn.phototourl.com/free/2026-04-11-c6cf83a1-60bb-4ec1-98b5-5f8cf6cad7e7.png') center/cover fixed; 
    color: #fff; font-family: 'Rajdhani', sans-serif;
  }
  .panel { 
    background: rgba(13, 18, 32, 0.95); 
    border: 1px solid #f59e0b; 
    padding: 25px; 
    border-radius: 12px; 
    max-width: 450px; 
    margin: 0 auto; 
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
  }
  h2 { color:#f59e0b; margin-top:0; font-family: 'Share Tech Mono'; letter-spacing: 2px; }
  input, textarea { 
    width: 100%; background: #000; color: #f59e0b; border: 1px solid #302010; 
    padding: 12px; margin: 8px 0; border-radius: 4px; box-sizing: border-box; 
    font-family: 'Share Tech Mono'; 
  }
  textarea { height: 100px; resize: vertical; }
  button { 
    width: 100%; background: #f59e0b; color: #000; border: none; 
    padding: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; 
    margin-top: 10px; transition: 0.3s;
  }
  button:hover { background: #fff; box-shadow: 0 0 15px #f59e0b; }
  .v-card { 
    border-left: 3px solid #f59e0b; 
    padding: 15px; 
    margin-top: 10px; 
    background: rgba(245,158,11,0.08); 
    border-radius: 8px; 
    backdrop-filter: blur(5px);
  }
  .v-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .v-tag { font-size: 9px; padding: 2px 6px; background: rgba(245,158,11,0.1); border: 1px solid #f59e0b; border-radius: 3px; }
  .v-btn { 
    display: inline-block; background: #f59e0b; color: #000; 
    text-decoration: none; padding: 5px 15px; font-weight: bold; 
    font-size: 12px; border-radius: 4px;
  }
  .v-html { margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.6); border: 1px dashed rgba(245,158,11,0.3); border-radius: 4px; }
  small { font-family: 'Share Tech Mono'; color: #888; font-size: 10px; overflow-wrap: break-word; display: block; }
</style>
</head>
<body>
  <div id="login-zone" class="panel">
    <h2>🔐 VAULT_ACCESS</h2>
    <input id="e" type="email" placeholder="Email">
    <input id="p" type="password" placeholder="Password">
    <button onclick="authAction('in')">LOG IN</button>
    <button style="background:#333; color:#fff;" onclick="authAction('up')">NEW VAULT</button>
  </div>
  <div id="vault-zone" style="display:none">
    <div class="panel">
      <h2>VAULT_STORAGE</h2>
      <input id="vn" placeholder="Entry Name">
      <textarea id="vu" placeholder="URL or HTML Snippet"></textarea>
      <button onclick="addVault()">STORE DATA</button>
      <button style="background:#333; color:#fff;" onclick="signOut(auth)">LOCK VAULT</button>
    </div>
    <div id="v-list" style="margin-top:20px;"></div>
  </div>
</body>
</html>
