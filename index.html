<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoshi-Web — My Links</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #080b12; --bg2: #0d1220; --surface: #151f30; --border: #1e3050;
    --neon: #00ffe1; --neon2: #7c3aed; --text: #d0e8ff; --text-dim: #4a6080;
    --font-main: 'Rajdhani', sans-serif; --font-mono: 'Share Tech Mono', monospace; --font-px: 'Press Start 2P', cursive;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font-main); margin: 0; overflow-x: hidden; }
  nav { background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; height: 60px; position: sticky; top: 0; z-index: 100; }
  .nav-logo { font-family: var(--font-px); font-size: 10px; color: var(--neon); margin-right: 30px; }
  .nav-btn { color: var(--text-dim); text-decoration: none; font-weight: 600; font-size: 14px; margin-right: 20px; transition: 0.2s; cursor: pointer; }
  .nav-btn:hover, .nav-btn.active { color: var(--neon); text-shadow: 0 0 10px var(--neon); }
  
  main { padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 25px; margin-bottom: 30px; }
  .field { margin-bottom: 15px; }
  label { display: block; font-size: 12px; color: var(--neon); margin-bottom: 5px; text-transform: uppercase; }
  input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 4px; font-family: var(--font-mono); }
  .btn { background: var(--neon); color: var(--bg); border: none; padding: 10px 20px; border-radius: 4px; font-weight: 700; cursor: pointer; font-family: var(--font-main); }
  
  .links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
  .link-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 15px; cursor: pointer; transition: 0.3s; position: relative; }
  .link-card:hover { border-color: var(--neon); transform: translateY(-3px); }
  .link-img { width: 100%; height: 120px; background: var(--surface); border-radius: 4px; object-fit: cover; margin-bottom: 10px; }
  .link-name { font-weight: 700; font-size: 18px; color: var(--text); }
  .del-btn { position: absolute; top: 10px; right: 10px; background: #ff4444; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 10px; padding: 5px; }

  /* VIEWER UI */
  #viewer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
  #viewer-window { width: 90vw; height: 85vh; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
  .viewer-bar { background: #2b2b2b; padding: 10px 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #333; }
  .viewer-dots { display: flex; gap: 6px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .address-bar { flex: 1; background: #111; border: 1px solid #444; border-radius: 20px; padding: 5px 20px; color: #aaa; font-family: var(--font-mono); font-size: 13px; display: flex; align-items: center; }
  .address-bar span { color: var(--neon); margin-right: 5px; }
  .viewer-content { flex: 1; background: white; border: none; width: 100%; }
</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD9v8tKBmSU9vqqgBO34yBMRrbHcFZFAs0",
    authDomain: "yoshiuniverse-6e0c9.firebaseapp.com",
    databaseURL: "https://yoshiuniverse-6e0c9-default-rtdb.firebaseio.com",
    projectId: "yoshiuniverse-6e0c9",
    storageBucket: "yoshiuniverse-6e0c9.firebasestorage.app",
    messagingSenderId: "645597342267",
    appId: "1:645597342267:web:77b3b632310f86e198ca1e"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  let currentUser = null;

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      loadLinks();
    } else {
      signInAnonymously(auth);
    }
  });

  window.openViewer = (url) => {
    const overlay = document.getElementById('viewer-overlay');
    const iframe = document.getElementById('viewer-frame');
    iframe.src = url;
    overlay.style.display = 'flex';
  };

  window.closeViewer = () => {
    document.getElementById('viewer-overlay').style.display = 'none';
    document.getElementById('viewer-frame').src = 'about:blank';
  };

  window.addLink = () => {
    const name = document.getElementById('ml-name').value;
    const url = document.getElementById('ml-url').value;
    const img = document.getElementById('ml-image').value || 'https://via.placeholder.com/250x120/151f30/00ffe1?text=No+Image';
    if(!name || !url) return;
    push(ref(db, `users/${currentUser.uid}/links`), { name, url, img });
    document.getElementById('ml-name').value = '';
    document.getElementById('ml-url').value = '';
  };

  function loadLinks() {
    onValue(ref(db, `users/${currentUser.uid}/links`), (snapshot) => {
      const grid = document.getElementById('links-grid');
      grid.innerHTML = '';
      snapshot.forEach(child => {
        const data = child.val();
        const div = document.createElement('div');
        div.className = 'link-card';
        div.onclick = () => window.openViewer(data.url);
        div.innerHTML = `
          <button class="del-btn" onclick="event.stopPropagation(); window.deleteLink('${child.key}')">X</button>
          <img class="link-img" src="${data.img}">
          <div class="link-name">${data.name}</div>
        `;
        grid.appendChild(div);
      });
    });
  }

  window.deleteLink = (id) => {
    remove(ref(db, `users/${currentUser.uid}/links/${id}`));
  };
</script>
</head>
<body>

<nav>
  <div class="nav-logo">YOSHI-WEB</div>
  <a class="nav-btn" href="home.html">Home</a>
  <a class="nav-btn active" href="mylinks.html">MyLinks</a>
  <a class="nav-btn" href="public.html">Public</a>
</nav>

<main>
  <div class="panel">
    <label>Display Name</label>
    <input id="ml-name" type="text" placeholder="Site Name">
    <label style="margin-top:15px">URL</label>
    <input id="ml-url" type="url" placeholder="https://...">
    <label style="margin-top:15px">Image URL (Optional)</label>
    <input id="ml-image" type="text" placeholder="https://...">
    <button class="btn" style="margin-top:20px" onclick="addLink()">+ Add Private Link</button>
  </div>

  <div id="links-grid" class="links-grid"></div>
</main>

<div id="viewer-overlay">
  <div id="viewer-window">
    <div class="viewer-bar">
      <div class="viewer-dots">
        <div class="dot" style="background:#ff5f56; cursor:pointer" onclick="closeViewer()"></div>
        <div class="dot" style="background:#ffbd2e"></div>
        <div class="dot" style="background:#27c93f"></div>
      </div>
      <div class="address-bar">
        <span>https://</span>you-anon.link/view?target=...
      </div>
    </div>
    <iframe id="viewer-frame" class="viewer-content"></iframe>
  </div>
</div>

</body>
</html>
