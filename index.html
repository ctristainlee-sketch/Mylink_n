
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const config = {
    apiKey: "AIzaSyD9v8tKBmSU9vqqgBO34yBMRrbHcFZFAs0",
    authDomain: "yoshiuniverse-6e0c9.firebaseapp.com",
    databaseURL: "https://yoshiuniverse-6e0c9-default-rtdb.firebaseio.com",
    projectId: "yoshiuniverse-6e0c9",
    storageBucket: "yoshiuniverse-6e0c9.firebasestorage.app",
    messagingSenderId: "645597342267",
    appId: "1:645597342267:web:77b3b632310f86e198ca1e"
  };

  const app = initializeApp(config);
  const auth = getAuth(app);
  const db = getDatabase(app);

  onAuthStateChanged(auth, user => {
    const authView = document.getElementById('vault-auth');
    const mainView = document.getElementById('vault-main');
    
    if (user) {
      authView.style.display = 'none';
      mainView.style.display = 'block';
      
      const userLinksRef = ref(db, `users/${user.uid}/links`);
      onValue(userLinksRef, (snap) => {
        const feed = document.getElementById('vault-feed');
        feed.innerHTML = '';
        snap.forEach(child => {
          const d = child.val();
          const card = document.createElement('div');
          card.className = 'vault-card';
          const isCode = d.anonLink.trim().startsWith('<');
          
          card.innerHTML = `
            <div class="v-meta">ENCRYPTED_ENTRY: ${child.key.substring(0,6)}</div>
            <div class="v-name">${d.name}</div>
            ${isCode ? 
              `<div class="v-code-preview"><code>RAW_SOURCE_ENCRYPTED</code></div>` : 
              `<a href="${d.anonLink}" target="_blank" class="v-action-btn">DECRYPT_&_OPEN</a>`
            }
          `;
          feed.appendChild(card);
        });
      });
    } else {
      authView.style.display = 'block';
      mainView.style.display = 'none';
    }
  });

  window.initAuth = () => {
    const em = document.getElementById('vault-email').value;
    const ps = document.getElementById('vault-pass').value;
    if(em && ps) {
      signInWithEmailAndPassword(auth, em, ps).catch(err => {
        document.getElementById('auth-err').innerText = "AUTH_DENIED: INVALID_CREDENTIALS";
      });
    }
  };

  window.terminateSession = () => signOut(auth);

  window.commitToVault = () => {
    const n = document.getElementById('v-input-name').value;
    const l = document.getElementById('v-input-link').value;
    if(n && l && auth.currentUser) {
      push(ref(db, `users/${auth.currentUser.uid}/links`), {
        name: n,
        anonLink: l,
        addedAt: Date.now()
      });
      document.getElementById('v-input-name').value = '';
      document.getElementById('v-input-link').value = '';
    }
  };
</script>
<style>
  body { 
    margin: 0; padding: 20px; 
    background: transparent; 
    color: #fff; 
    font-family: 'Rajdhani', sans-serif;
  }

  .vault-panel { 
    background: rgba(25, 20, 10, 0.95); 
    border: 1px solid rgba(245, 158, 11, 0.3); 
    padding: 35px; 
    border-radius: 14px; 
    margin: 0 auto 30px auto; 
    max-width: 480px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.7);
    /* Edge Fading */
    mask-image: linear-gradient(to bottom, black 92%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, black 92%, transparent 100%);
  }

  .v-header {
    font-family: 'Share Tech Mono', monospace;
    color: #f59e0b;
    font-size: 13px;
    margin-bottom: 20px;
    display: block;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  input, textarea { 
    width: 100%; 
    background: #000; 
    color: #f59e0b; 
    border: 1px solid #443311; 
    padding: 14px; 
    margin: 10px 0; 
    border-radius: 6px; 
    box-sizing: border-box; 
    font-family: 'Share Tech Mono';
    font-size: 14px;
    outline: none;
  }

  input:focus, textarea:focus { border-color: #f59e0b; }

  .v-primary-btn { 
    width: 100%; 
    background: #f59e0b; 
    color: #000;
    border: none; 
    padding: 15px; 
    font-weight: 700; 
    cursor: pointer; 
    border-radius: 6px; 
    font-family: 'Share Tech Mono';
    text-transform: uppercase;
    margin-top: 10px;
  }

  .vault-card { 
    background: rgba(0, 0, 0, 0.7); 
    border-left: 4px solid #f59e0b; 
    padding: 22px; 
    margin-top: 15px; 
    border-radius: 8px;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }

  .v-meta { font-family: 'Share Tech Mono'; font-size: 10px; color: #78350f; margin-bottom: 8px; }
  .v-name { color: #f59e0b; font-size: 20px; font-weight: 700; }
  
  .v-action-btn { 
    display: inline-block; 
    background: transparent; 
    color: #f59e0b; 
    text-decoration: none; 
    padding: 8px 18px; 
    font-size: 12px; 
    font-weight: 700; 
    border: 1px solid #f59e0b;
    border-radius: 4px;
    font-family: 'Share Tech Mono';
    margin-top: 15px;
    transition: 0.3s;
  }

  .v-action-btn:hover { background: #f59e0b; color: #000; }

  .v-code-preview { 
    background: #0a0805; 
    border: 1px dashed #443311; 
    padding: 10px; 
    margin-top: 12px; 
    font-size: 12px; 
    color: #554422;
  }

  #auth-err { color: #ef4444; font-size: 12px; font-family: 'Share Tech Mono'; margin-top: 10px; text-align: center; }
</style>
</head>
<body>
  <div id="vault-auth" class="vault-panel">
    <span class="v-header">// SECURE_VAULT_ACCESS</span>
    <input id="vault-email" placeholder="Uplink ID (Email)">
    <input id="vault-pass" type="password" placeholder="Encryption Key (Password)">
    <button class="v-primary-btn" onclick="initAuth()">AUTHORIZE_ENTRY</button>
    <div id="auth-err"></div>
  </div>

  <div id="vault-main" style="display:none">
    <div class="vault-panel">
      <span class="v-header">// VAULT_CONTROLS</span>
      <input id="v-input-name" placeholder="Asset Name">
      <textarea id="v-input-link" rows="2" placeholder="Secure Link / HTML Asset"></textarea>
      <button class="v-primary-btn" onclick="commitToVault()">COMMIT_TO_VAULT</button>
      <button style="background:transparent; color:#f59e0b; border:1px solid #443311; font-size:11px; margin-top:15px; width:100%; height:35px; cursor:pointer;" onclick="terminateSession()">TERMINATE_SESSION</button>
    </div>
    <div id="vault-feed"></div>
  </div>
</body>
</html>
