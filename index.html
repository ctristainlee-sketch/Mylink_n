
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoshi World | Vault</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #050000;
            --panel: rgba(18, 0, 0, 0.98);
            --accent: #e11d48;
            --danger: #ff0055;
            --warning: #ffcc00;
            --border: #3d0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; transition: 0.2s ease; }
        body { background: var(--bg); color: #e2e2e2; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .toolbar { background: #000; border-bottom: 1px solid var(--border); padding: 12px; display: flex; gap: 10px; align-items: center; }
        .omni { flex: 1; background: #000; border: 1px solid var(--border); padding: 10px; color: var(--accent); outline: none; font-size: 13px; border-radius: 4px; }

        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 350px; background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }

        .card-btn { background: #000; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; cursor: pointer; position: relative; }
        .card-btn:hover { border-color: var(--accent); background: #0f0000; transform: scale(1.02); }
        .card-btn.active { border-color: var(--accent); background: #1a0000; }

        .card-thumb { height: 110px; background: #000; overflow: hidden; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
        .card-thumb iframe { transform: scale(0.22); transform-origin: 0 0; width: 454%; height: 454%; pointer-events: none; border: none; }

        .card-body { padding: 10px; }
        .card-name { font-weight: bold; color: var(--accent); font-size: 12px; letter-spacing: 1px; }
        .card-url { font-size: 10px; color: #666; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; margin-top: 4px; }

        .status-tag {
            position: absolute; top: 6px; left: 6px; padding: 3px 6px; font-size: 8px; 
            font-weight: bold; border-radius: 2px; z-index: 10; background: rgba(0,0,0,0.8); border: 1px solid var(--border);
        }
        .status-secure { border-color: var(--accent); color: var(--accent); }
        .status-sus { border-color: var(--warning); color: var(--warning); }
        .status-blocked { border-color: var(--danger); color: var(--danger); }

        .viewer { flex: 1; background: #fff; position: relative; }
        iframe#mainFrame { width: 100%; height: 100%; border: none; }

        .del { position: absolute; top: 6px; right: 6px; color: #a00; font-size: 11px; z-index: 5; background: rgba(0,0,0,0.8); width:20px; height:20px; display:flex; align-items:center; justify-content:center; border: 1px solid var(--border); border-radius: 2px; }
        .del:hover { background: var(--danger); color: #fff; }

        #gate { position: fixed; inset: 0; z-index: 1000; background: #000; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
        .auth-container { width: 100%; max-width: 320px; text-align: center; }
        .auth-input { width: 100%; background: #000; border: 1px solid var(--border); color: var(--accent); padding: 14px; margin-bottom: 12px; outline: none; border-radius: 4px; font-size: 14px; }
        .auth-btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 14px; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 14px; }
        .auth-toggle { font-size: 11px; color: #666; cursor: pointer; margin-top: 15px; text-decoration: underline; letter-spacing: 1px; }

        dialog { background:#000; color:#fff; border:1px solid var(--border); padding:25px; border-radius:10px; width:100%; max-width:400px; margin: auto; outline:none; }
        dialog::backdrop { background: rgba(0,0,0,0.9); }
        .err { color: var(--danger); font-size: 10px; margin-top: 8px; display: none; font-weight: bold; }
        button:active { opacity: 0.7; }
    </style>
</head>
<body>

    <div id="gate">
        <div class="auth-container">
            <h1 id="gateTitle" style="letter-spacing:12px; color:var(--accent); margin-bottom: 30px;">VAULT_LOGIN</h1>
            <div id="gateError" style="color:var(--danger); font-size:11px; margin-bottom:15px; height: 15px;"></div>
            <input type="email" id="authEmail" class="auth-input" placeholder="ACCESS_ID (EMAIL)">
            <input type="password" id="authPass" class="auth-input" placeholder="ACCESS_KEY (PASS)">
            <button onclick="handleAuth()" class="auth-btn" id="authActionBtn">ACCESS_VAULT</button>
            <div class="auth-toggle" onclick="toggleAuthMode()" id="authModeToggle">NEW_RECRUIT? (SIGN_UP)</div>
        </div>
    </div>

    <div class="toolbar">
        <input type="text" id="addr" class="omni" placeholder="PROX_PROTOCOL_LINK" readonly>
        <button onclick="auth.signOut()" style="background:none; border:1px solid var(--border); color:var(--accent); cursor:pointer; padding:8px 15px; font-size: 11px; font-weight: bold;">LOGOUT</button>
        <button onclick="document.getElementById('addBox').showModal()" style="background:var(--accent); color:#000; border:none; cursor:pointer; padding:8px 15px; font-weight: bold; border-radius: 4px;">+</button>
    </div>

    <div class="main">
        <div class="sidebar" id="sidebar"></div>
        <div class="viewer">
            <iframe id="mainFrame" name="mainFrame"></iframe>
        </div>
    </div>

    <dialog id="addBox">
        <h2 style="color:var(--accent); font-size: 16px; margin-bottom: 15px; letter-spacing: 2px;">SECURE_COMMIT</h2>
        <input type="text" id="v-n" placeholder="LABEL" style="width:100%; background:#000; color:var(--accent); border:1px solid var(--border); padding:10px; margin-bottom:12px; border-radius: 4px;">
        <textarea id="v-l" placeholder="LINK OR SOURCE_CODE" style="width:100%; background:#000; color:var(--accent); border:1px solid var(--border); padding:10px; margin-bottom:12px; border-radius: 4px; font-family: monospace;" rows="6"></textarea>
        <div id="vaultError" class="err">ALERT: IDENTICAL_ENTRY_EXISTS</div>
        <button onclick="save()" style="width:100%; padding:14px; background:var(--accent); color: #000; border:none; margin-top:5px; cursor:pointer; font-weight:bold; border-radius: 4px;">COMMIT_TO_VAULT</button>
        <button onclick="document.getElementById('addBox').close()" style="width:100%; padding:8px; background:none; border:none; color:#555; margin-top:10px; cursor:pointer">DISCARD</button>
    </dialog>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD9v8tKBmSU9vqqgBO34yBMRrbHcFZFAs0",
        databaseURL: "https://yoshiuniverse-6e0c9-default-rtdb.firebaseio.com",
        projectId: "yoshiuniverse-6e0c9",
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(); const db = firebase.database();

    let isLoginMode = true;

    async function performAtlasScan(url) {
        if (!url || typeof url !== 'string') return { state: 'BLOCKED', label: 'NULL' };
        if (!url.startsWith('http')) return { state: 'SECURE', label: 'VAULT_CODE' };
        try {
            return url.includes('google.com') || url.includes('github.com') ? { state: 'SECURE', label: 'VERIFIED' } : { state: 'SUS', label: 'UNVERIFIED' };
        } catch(e) { return { state: 'BLOCKED', label: 'ERR' }; }
    }

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('gateTitle').innerText = isLoginMode ? 'VAULT_LOGIN' : 'VAULT_SIGNUP';
        document.getElementById('authActionBtn').innerText = isLoginMode ? 'ACCESS_VAULT' : 'CREATE_ACCESS';
        document.getElementById('authModeToggle').innerText = isLoginMode ? 'NEW_RECRUIT? (SIGN_UP)' : 'ALREADY_HAVE_KEY? (LOGIN)';
    }

    async function handleAuth() {
        const e = document.getElementById('authEmail').value.trim();
        const p = document.getElementById('authPass').value.trim();
        const err = document.getElementById('gateError');
        if(!e || !p) { err.innerText = "MISSING_CREDENTIALS"; return; }
        try {
            if (isLoginMode) await auth.signInWithEmailAndPassword(e, p);
            else await auth.createUserWithEmailAndPassword(e, p);
        } catch (errObj) { err.innerText = errObj.message.toUpperCase().replace(/FIREBASE/g, 'CORE'); }
    }

    auth.onAuthStateChanged(u => {
        document.getElementById('gate').style.display = u ? 'none' : 'flex';
        if(u) {
            db.ref(`users/${u.uid}/links`).on('value', snapshot => {
                const sidebar = document.getElementById('sidebar');
                sidebar.innerHTML = '';
                const data = snapshot.val();
                if (!data) return;
                Object.entries(data).forEach(([key, item]) => createAndScanVaultCard(item, key, u.uid, sidebar));
            });
        }
    });

    async function createAndScanVaultCard(item, key, uid, container) {
        const isCode = !item.anonLink.startsWith('http') && (item.anonLink.includes('<') || item.anonLink.includes('{') || item.anonLink.includes('=>'));
        const btn = document.createElement('div');
        btn.className = 'card-btn';
        btn.id = `btn-${key}`;
        btn.onclick = () => {
            // Remove active class from all buttons
            document.querySelectorAll('.card-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const frame = document.getElementById('mainFrame');
            
            // CRITICAL FIX: Reset frame completely to clear previous code/src state
            frame.removeAttribute('srcdoc');
            frame.removeAttribute('src');
            
            // Force a small delay to ensure DOM update before reloading
            setTimeout(() => {
                if (isCode) {
                    frame.srcdoc = `<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>body{margin:0;background:#fff;overflow-x:hidden;}</style></head><body>${item.anonLink}</body></html>`;
                } else {
                    frame.src = item.anonLink.startsWith('//') ? 'https:' + item.anonLink : (item.anonLink.includes('://') ? item.anonLink : 'https://' + item.anonLink);
                }
                document.getElementById('addr').value = isCode ? 'ENCRYPTED_SOURCE_RENDER' : item.anonLink;
            }, 10);
        };

        const thumbHtml = isCode ? `<iframe srcdoc="<html><body style='overflow:hidden;margin:0;'>${item.anonLink}</body></html>"></iframe>` : `<iframe src="${item.anonLink}"></iframe>`;

        btn.innerHTML = `
            <div class="status-tag">SCANNING</div>
            <div class="del" onclick="event.stopPropagation(); if(confirm('WIPE_DATA?')) db.ref('users/${uid}/links/${key}').remove()">✕</div>
            <div class="card-thumb">${thumbHtml}</div>
            <div class="card-body">
                <div class="card-name">${item.name}</div>
                <div class="card-url">${isCode ? 'Source Component' : item.anonLink}</div>
            </div>
        `;
        container.appendChild(btn);

        const scan = await performAtlasScan(item.anonLink);
        const tag = btn.querySelector('.status-tag');
        tag.innerText = scan.label;
        tag.classList.add(scan.state === 'SECURE' ? 'status-secure' : (scan.state === 'SUS' ? 'status-sus' : 'status-blocked'));
    }

    async function save() {
        const n = document.getElementById('v-n').value.trim();
        const l = document.getElementById('v-l').value.trim();
        const err = document.getElementById('vaultError');
        err.style.display = 'none';
        
        if(n && l && auth.currentUser) {
            const snapshot = await db.ref(`users/${auth.currentUser.uid}/links`).once('value');
            const current = snapshot.val() || {};
            if(Object.values(current).some(i => i.anonLink === l)) { 
                err.style.display = 'block'; 
                return; 
            }
            
            db.ref(`users/${auth.currentUser.uid}/links`).push({name:n, anonLink:l}).then(() => {
                document.getElementById('addBox').close();
                document.getElementById('v-n').value = '';
                document.getElementById('v-l').value = '';
            });
        }
    }
</script>
</body>
</html>
