
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault Node — Mylinks</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD9v8tKBmSU9vqqgBO34yBMRrbHcFZFAs0",
    authDomain: "yoshiuniverse-6e0c9.firebaseapp.com",
    databaseURL: "https://yoshiuniverse-6e0c9-default-rtdb.firebaseio.com",
    projectId: "yoshiuniverse-6e0c9",
    storageBucket: "yoshiuniverse-6e0c9.firebasestorage.app",
    messagingSenderId: "645597342267",
    appId: "1:645597342267:web:77b3b632310f86e198ca1e"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  onAuthStateChanged(auth, (user) => {
    const login = document.getElementById('login-zone');
    const vault = document.getElementById('vault-zone');
    if (user) {
      login.style.display = 'none';
      vault.style.display = 'block';
      loadVault(user.uid);
    } else {
      login.style.display = 'block';
      vault.style.display = 'none';
    }
  });

  // Atlas Vault Scanner: Detects blocks and UI-incompatibility
  async function atlasVaultPurge(uid, id, url) {
    if (!url || url.trim().startsWith('<')) return;
    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 5000);
      
      // mode: 'no-cors' allows us to ping blocked sites
      await fetch(url, { mode: 'no-cors', signal: controller.signal });
      clearTimeout(timeoutId);
    } catch (err) {
      console.warn(`[ATLAS_VAULT] Purging dead link: ${id}`);
      remove(ref(db, `users/${uid}/links/${id}`));
    }
  }

  function loadVault(uid) {
    onValue(ref(db, `users/${uid}/links`), (snap) => {
      const list = document.getElementById('v-list');
      list.innerHTML = '';
      
      if (!snap.exists()) {
        list.innerHTML = '<div style="text-align:center; opacity:0.5; font-family:\'Share Tech Mono\'">VAULT_STORAGE_EMPTY</div>';
        return;
      }

      snap.forEach(child => {
        const d = child.val();
        const targetContent = d.anonLink || ""; 
        const card = document.createElement('div');
        card.className = 'v-card';
        const isHtml = targetContent.trim().startsWith('<');
        
        if (isHtml) {
          card.innerHTML = `
            <div class="v-header"><strong>${d.name}</strong> <span class="v-tag">CODE_ASSET</span></div>
            <div class="v-html-container">${targetContent}</div>
          `;
        } else {
          card.innerHTML = `
            <div class="v-header"><strong>${d.name}</strong> <span class="v-tag">LINK_ASSET</span></div>
            <div class="v-iframe-container">
              <iframe src="${targetContent}" loading="lazy" onload="this.style.height=this.contentWindow.document.body.scrollHeight + 'px';"></iframe>
            </div>
            <div style="margin-top:10px; display:flex; gap:10px; align-items:center;">
               <a href="${targetContent}" target="_blank" class="v-btn">LAUNCH</a>
               <small>${targetContent.substring(0, 40)}...</small>
            </div>
          `;
          atlasVaultPurge(uid, child.key, targetContent);
        }
        list.appendChild(card);
      });
    });
  }

  window.authAction = (t) => {
    const e = document.getElementById('e').value;
    const p = document.getElementById('p').value;
    if(t === 'in') {
      signInWithEmailAndPassword(auth, e, p).catch(err => alert("AUTH_ERROR: " + err.message));
    } else {
      createUserWithEmailAndPassword(auth, e, p).catch(err => alert("REG_ERROR: " + err.message));
    }
  };

  window.addVault = () => {
    const n = document.getElementById('vn').value;
    const u = document.getElementById('vu').value;
    if(n && u && auth.currentUser) {
      push(ref(db, `users/${auth.currentUser.uid}/links`), { 
        name: n, 
        anonLink: u,
        addedAt: Date.now() 
      }).then(() => {
        document.getElementById('vn').value = '';
        document.getElementById('vu').value = '';
      });
    }
  };
</script>
<style>
  body { 
    margin: 0; padding: 20px;
    background: transparent;
    color: #fff; font-family: 'Rajdhani', sans-serif;
  }
  .panel { 
    background: rgba(20, 15, 5, 0.95); border: 1px solid #f59e0b; 
    padding: 25px; border-radius: 12px; max-width: 500px; 
    margin: 0 auto; backdrop-filter: blur(10px);
    mask-image: linear-gradient(to bottom, black 95%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, black 95%, transparent 100%);
  }
  h2 { color:#f59e0b; margin-top:0; font-family: 'Share Tech Mono'; letter-spacing: 2px; text-align: center; }
  input, textarea { 
    width: 100%; background: #000; color: #f59e0b; border: 1px solid #443311; 
    padding: 12px; margin: 8px 0; border-radius: 4px; box-sizing: border-box; 
    font-family: 'Share Tech Mono'; outline: none;
  }
  button { 
    width: 100%; background: #f59e0b; color: #000; border: none; 
    padding: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; 
    margin-top: 10px; font-family: 'Share Tech Mono'; text-transform: uppercase;
  }
  .v-card { 
    border-left: 3px solid #f59e0b; padding: 20px; margin-top: 20px; 
    background: rgba(0,0,0,0.6); border-radius: 8px; 
    border-top: 1px solid rgba(245,158,11,0.1);
    border-right: 1px solid rgba(245,158,11,0.1);
  }
  .v-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .v-tag { font-size: 9px; padding: 2px 6px; background: rgba(245,158,11,0.1); border: 1px solid #f59e0b; border-radius: 3px; color: #f59e0b; }
  
  .v-iframe-container { width: 100%; height: 350px; background: #000; border-radius: 4px; overflow: hidden; border: 1px solid #222; }
  iframe { width: 100%; height: 100%; border: none; background: #fff; }
  
  .v-html-container { padding: 15px; background: #050505; border: 1px dashed rgba(245,158,11,0.3); border-radius: 4px; max-height: 400px; overflow-y: auto; }
  
  .v-btn { display: inline-block; background: #f59e0b; color: #000; text-decoration: none; padding: 6px 15px; font-weight: bold; font-size: 11px; border-radius: 4px; font-family: 'Share Tech Mono'; }
  small { font-family: 'Share Tech Mono'; color: #666; font-size: 10px; overflow-wrap: break-word; }
</style>
</head>
<body>
  <div id="login-zone" class="panel">
    <h2>VAULT_INIT</h2>
    <input id="e" type="email" placeholder="IDENTITY_EMAIL">
    <input id="p" type="password" placeholder="SECURITY_KEY">
    <button onclick="authAction('in')">ACCESS_VAULT</button>
    <button style="background:transparent; color:#f59e0b; border: 1px solid #443311;" onclick="authAction('up')">GENERATE_NEW_VAULT</button>
  </div>
  <div id="vault-zone" style="display:none">
    <div class="panel">
      <h2>VAULT_MANAGEMENT</h2>
      <input id="vn" placeholder="ASSET_IDENTIFIER">
      <textarea id="vu" placeholder="PASTE_URL_OR_SOURCE_CODE"></textarea>
      <button onclick="addVault()">COMMIT_TO_VAULT</button>
      <button style="background:transparent; color:#f59e0b; border: 1px solid #443311; font-size:10px;" onclick="signOut(auth)">TERMINATE_SESSION</button>
    </div>
    <div id="v-list" style="margin-top:20px;"></div>
  </div>
</body>
</html>
